<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oke Legal Group — Under Reconstruction</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@200;300;400;500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --black: #0a0806;
            --off-black: #111009;
            --gold: #8c6d52;
            --gold-light: #b08d6e;
            --gold-pale: #c9a882;
            --cream: #f5f0ea;
            --cream-dim: rgba(245, 240, 234, 0.6);
            --cream-faint: rgba(245, 240, 234, 0.15);
            --font-serif: 'Cormorant Garamond', Georgia, serif;
            --font-sans: 'Montserrat', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            background-color: #ffffff;
            color: var(--black);
            font-family: var(--font-sans);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            position: relative;
        }

        /* Ambient background texture */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 70% 60% at 50% 40%, rgba(140, 109, 82, 0.08) 0%, transparent 70%),
                radial-gradient(ellipse 40% 40% at 20% 80%, rgba(140, 109, 82, 0.05) 0%, transparent 60%),
                radial-gradient(ellipse 30% 30% at 80% 20%, rgba(140, 109, 82, 0.04) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        /* Subtle grain overlay */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
            opacity: 0.4;
            pointer-events: none;
            z-index: 1;
        }

        /* Thin horizontal rule lines for atmosphere */
        .line-top, .line-bottom {
            position: fixed;
            left: 48px;
            right: 48px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(140, 109, 82, 0.3), transparent);
        }
        .line-top { top: 40px; }
        .line-bottom { bottom: 40px; }

        /* Corner marks */
        .corner {
            position: fixed;
            width: 20px;
            height: 20px;
        }
        .corner::before, .corner::after {
            content: '';
            position: absolute;
            background: rgba(140, 109, 82, 0.4);
        }
        .corner::before { width: 1px; height: 100%; }
        .corner::after { width: 100%; height: 1px; }
        .corner-tl { top: 32px; left: 32px; }
        .corner-tr { top: 32px; right: 32px; transform: scaleX(-1); }
        .corner-bl { bottom: 32px; left: 32px; transform: scaleY(-1); }
        .corner-br { bottom: 32px; right: 32px; transform: scale(-1); }

        /* Main container */
        .container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 40px 24px;
            max-width: 800px;
            width: 100%;
            animation: fadeUp 1.2s ease forwards;
            opacity: 0;
            transform: translateY(24px);
        }

        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Logo */
        .logo-wrap {
            margin-bottom: 48px;
            animation: fadeUp 1.2s ease 0.15s forwards;
            opacity: 0;
            transform: translateY(16px);
        }

        .logo-wrap img {
            display: none;
        }

        /* Decorative line */
        .ornament {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 36px;
            animation: fadeUp 1.2s ease 0.25s forwards;
            opacity: 0;
            transform: translateY(12px);
        }
        .ornament-line {
            width: 60px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold));
        }
        .ornament-line.right {
            background: linear-gradient(90deg, var(--gold), transparent);
        }
        .ornament-diamond {
            width: 5px;
            height: 5px;
            background: var(--gold);
            transform: rotate(45deg);
        }

        /* Main headline */
        h1 {
            font-family: var(--font-serif);
            font-weight: 300;
            font-size: clamp(2.6rem, 6vw, 5rem);
            line-height: 1.08;
            letter-spacing: -0.01em;
            color: var(--black);
            margin-bottom: 8px;
            animation: fadeUp 1.2s ease 0.35s forwards;
            opacity: 0;
            transform: translateY(12px);
        }

        h1 em {
            font-style: italic;
            color: var(--gold-pale);
        }

        /* Subheadline */
        .subhead {
            font-family: var(--font-sans);
            font-size: clamp(0.7rem, 1.5vw, 0.8rem);
            font-weight: 400;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 40px;
            animation: fadeUp 1.2s ease 0.45s forwards;
            opacity: 0;
            transform: translateY(10px);
        }

        /* Schedule prompt text */
        .schedule-prompt {
            font-family: var(--font-serif);
            font-size: clamp(1rem, 2.5vw, 1.3rem);
            font-weight: 300;
            color: rgba(10, 8, 6, 0.55);
            letter-spacing: 0.03em;
            margin-bottom: 28px;
            animation: fadeUp 1.2s ease 0.55s forwards;
            opacity: 0;
            transform: translateY(10px);
        }

        /* CTA Button */
        .btn-wrap {
            animation: fadeUp 1.2s ease 0.65s forwards;
            opacity: 0;
            transform: translateY(10px);
            margin-bottom: 64px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold-pale);
            font-family: var(--font-sans);
            font-size: 0.72rem;
            font-weight: 500;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            text-decoration: none;
            padding: 16px 36px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: color 0.4s ease, border-color 0.4s ease;
        }

        .btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--gold);
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.4s cubic-bezier(0.77, 0, 0.18, 1);
        }

        .btn:hover::before {
            transform: scaleX(1);
        }

        .btn:hover {
            color: #ffffff;
            border-color: var(--gold);
        }

        .btn span {
            position: relative;
            z-index: 1;
        }

        .btn svg {
            position: relative;
            z-index: 1;
            transition: transform 0.3s ease;
        }

        .btn:hover svg {
            transform: translateX(4px);
        }

        /* Divider */
        .divider {
            width: 1px;
            height: 40px;
            background: linear-gradient(to bottom, var(--gold), transparent);
            margin: 0 auto 40px;
            animation: fadeUp 1.2s ease 0.75s forwards;
            opacity: 0;
        }

        /* Footer copy */
        .tagline {
            font-family: var(--font-serif);
            font-size: clamp(0.95rem, 2vw, 1.1rem);
            font-weight: 300;
            font-style: italic;
            color: rgba(10, 8, 6, 0.4);
            line-height: 1.7;
            max-width: 520px;
            animation: fadeUp 1.2s ease 0.85s forwards;
            opacity: 0;
            transform: translateY(8px);
        }

        .tagline strong {
            font-style: normal;
            font-weight: 400;
            color: rgba(10, 8, 6, 0.6);
        }

        /* Status pill */
        .status {
            position: fixed;
            top: 40px;
            right: 60px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: var(--font-sans);
            font-size: 0.6rem;
            font-weight: 500;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--gold);
            z-index: 20;
            animation: fadeIn 1.5s ease 1s forwards;
            opacity: 0;
        }

        .status-dot {
            width: 5px;
            height: 5px;
            background: var(--gold);
            border-radius: 50%;
            animation: blink 2.5s ease-in-out infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.2; }
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        /* Responsive */
        @media (max-width: 600px) {
            .line-top, .line-bottom { left: 20px; right: 20px; }
            .corner-tl { top: 16px; left: 16px; }
            .corner-tr { top: 16px; right: 16px; }
            .corner-bl { bottom: 16px; left: 16px; }
            .corner-br { bottom: 16px; right: 16px; }
            .status { top: 20px; right: 24px; }
            .logo-wrap img { width: 120px; height: 120px; }
            .logo-wrap { margin-bottom: 32px; }
            .btn-wrap { margin-bottom: 44px; }
        }
    </style>
</head>

    <script>
        const img = document.getElementById('logoSrc');
        const canvas = document.getElementById('logoCanvas');
        img.style.display = 'none';

        function removeBackground() {
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;

            // Sample background color from corner pixel
            const bgR = data[0], bgG = data[1], bgB = data[2];
            const threshold = 40;

            for (let i = 0; i < data.length; i += 4) {
                const r = data[i], g = data[i+1], b = data[i+2];
                const dist = Math.sqrt(
                    (r - bgR) ** 2 + (g - bgG) ** 2 + (b - bgB) ** 2
                );
                if (dist < threshold) {
                    data[i + 3] = 0; // make transparent
                }
            }
            ctx.putImageData(imageData, 0, 0);
        }

        if (img.complete) {
            removeBackground();
        } else {
            img.onload = removeBackground;
        }
    </script>
